name: Deployment Pipeline

on: 
  push: 
    branches: 
      - main

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 
      - uses: actions/setup-node@v6
        with: 
          node-version: 16
      - name: Install Dependencies
        run: npm install --no-audit --no-fund --no-optional
      - name: Lint
        run: npm run eslint
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
        